<VirtualHost *:80>
    ServerName aotesys.com
    ServerAlias www.aotesys.com

    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]

    ErrorLog /var/log/httpd/aotesys.com_http_error.log
    CustomLog /var/log/httpd/aotesys.com_http_access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName aotesys.com
    ServerAlias www.aotesys.com

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/aotesys.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/aotesys.com/privkey.pem

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:5174/
    ProxyPassReverse / http://127.0.0.1:5174/

    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"

    ErrorLog /var/log/httpd/aotesys.com_ssl_error.log
    CustomLog /var/log/httpd/aotesys.com_ssl_access.log combined
</VirtualHost>
